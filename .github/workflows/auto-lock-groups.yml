name: "🔒 Auto-trava Palpites de Grupo"

on:
  schedule:
    - cron: '*/5 15-23 * 6-7 *'
    - cron: '*/5 0-5 * 6-7 *'
  workflow_dispatch:

jobs:
  auto-lock-groups:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'schedule')
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install sqlalchemy psycopg2-binary pytz

      - name: Auto-travar palpites de classificados de grupo
        env:
          DATABASE_URL: ${{ secrets.NEON_CONNECTION_STRING }}
        run: |
          python auto_lock_group_predictions.py
